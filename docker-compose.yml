services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/data/bundles
      - "AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET with: openssl rand -base64 32}"
      # Trusted local/intranet only: skips login/setup and runs all requests as admin.
      # - AUTH_BYPASS=true
