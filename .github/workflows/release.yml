name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Version Packages PR 생성 및 GitHub Release 태그
      pull-requests: write  # "Version Packages" PR 열기
      packages: write       # ghcr.io push
      id-token: write       # npm Trusted Publisher (OIDC)
      actions: write        # Docker workflow_dispatch 트리거

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Build CLI
        run: npm run build:cli

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run changeset:version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # publish 후 v{version} 태그를 push → docker.yml 이 semver 태그로 이미지를 빌드
      - name: Push git tag for Docker release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(jq -r '.version' packages/cli/package.json)
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Trigger Docker release
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' packages/cli/package.json)
          gh workflow run docker.yml --ref main -f version="v${VERSION}"
